<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostLive AI | Live Stream AI Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f1115] text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <i class="fas fa-ghost text-purple-500"></i> GhostLive AI
                </h1>
                <p class="text-slate-400 text-sm mt-1">Sistem Host Livestream Otomatis via AI</p>
            </div>
            
            <div id="statusPanel" class="bg-slate-800/50 px-6 py-3 rounded-full flex items-center gap-3 border border-slate-700">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
                <span id="statusText" class="font-semibold text-slate-300 text-sm uppercase tracking-wider">OFFLINE</span>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Target Username TikTok</label>
                    <input type="text" id="usernameInput" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg p-3 mb-4 focus:outline-none focus:border-purple-500" placeholder="Contoh: luna_live">
                    <button id="btnConnect" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition">
                        Connect TikTok
                    </button>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                    <h3 class="text-slate-400 font-semibold mb-4">Statistik</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between"><span>Komentar:</span> <span id="statComments" class="font-bold">0</span></div>
                        <div class="flex justify-between"><span>Balasan AI:</span> <span id="statAnswers" class="font-bold">0</span></div>
                    </div>
                </div>
            </div>

            <!-- Logs -->
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-black border border-slate-800 rounded-2xl overflow-hidden flex flex-col h-[500px]">
                    <div class="p-4 border-b border-slate-800 bg-slate-900/50 font-bold">Live Chat</div>
                    <div id="tiktokLogs" class="p-4 overflow-y-auto flex-1 text-sm space-y-2"></div>
                </div>
                <div class="bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden flex flex-col h-[500px]">
                    <div class="p-4 border-b border-slate-800 bg-slate-900/50 font-bold text-purple-400">AI Response</div>
                    <div id="aiLogs" class="p-4 overflow-y-auto flex-1 text-sm space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

   <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const socket = io("https://ghostlive-ai-mvp-production-4fa6.up.railway.app", {
        transports: ["websocket", "polling"]
    });
        
        // UI References
        const ui = {
            btnConnect: document.getElementById('btnConnect'),
            username: document.getElementById('usernameInput'),
            statusText: document.getElementById('statusText'),
            statusDot: document.getElementById('statusDot'),
            tiktokLogs: document.getElementById('tiktokLogs'),
            aiLogs: document.getElementById('aiLogs'),
            statComments: document.getElementById('statComments'),
            statAnswers: document.getElementById('statAnswers')
        };

        let commentCount = 0;
        let answerCount = 0;

        // Socket Listeners
        socket.on('status', (status) => {
            ui.statusText.innerText = status;
            ui.statusDot.className = `w-3 h-3 rounded-full ${status === 'connected' ? 'bg-green-500' : 'bg-red-500'}`;
        });

        socket.on('new_chat', (data) => {
            commentCount++;
            ui.statComments.innerText = commentCount;
            ui.tiktokLogs.innerHTML += `<div class="border-b border-slate-800 pb-1"><span class="text-blue-400">@${data.nickname}:</span> ${data.comment}</div>`;
        });

        socket.on('ai_response', (data) => {
            answerCount++;
            ui.statAnswers.innerText = answerCount;
            ui.aiLogs.innerHTML += `<div class="border-b border-slate-800 pb-1 text-purple-300">Luna: ${data.response}</div>`;
            
            // Auto Play Audio
            const audio = new Audio("data:audio/mp3;base64," + data.audio);
            audio.play();
        });

        // Connection Action
        ui.btnConnect.onclick = () => {
            const user = ui.username.value;
            if(user) socket.emit('connect_tiktok', user);
        };
    </script>
</body>
</html>
